name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  CARGO_NET_RETRY: 10
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build-wheels:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: "2_17"
            artifact: linux-x86_64
            docker_platform: linux/amd64
            test_image: quay.io/pypa/manylinux2014_x86_64
            python_command: /opt/python/cp311-cp311/bin/python
            binary_command: /opt/python/cp311-cp311/bin/codex-pal
          - runner: ubuntu-22.04
            target: aarch64
            manylinux: "2_17"
            artifact: linux-aarch64
            docker_platform: linux/arm64
            test_image: quay.io/pypa/manylinux2014_aarch64
            python_command: /opt/python/cp311-cp311/bin/python
            binary_command: /opt/python/cp311-cp311/bin/codex-pal
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: musllinux_1_2
            artifact: musllinux-x86_64
            docker_platform: linux/amd64
            test_image: python:3.11-alpine
            python_command: python
            binary_command: codex-pal
          - runner: ubuntu-22.04
            target: aarch64
            manylinux: musllinux_1_2
            artifact: musllinux-aarch64
            docker_platform: linux/arm64
            test_image: python:3.11-alpine
            python_command: python
            binary_command: codex-pal
          - runner: macos-15-intel
            target: x86_64
            manylinux: "off"
            artifact: macos-x86_64
          - runner: macos-latest
            target: aarch64
            manylinux: "off"
            artifact: macos-aarch64
          - runner: windows-latest
            target: x64
            manylinux: "off"
            artifact: windows-x86_64
            python_arch: x64
          - runner: windows-11-arm
            target: aarch64
            manylinux: "off"
            artifact: windows-aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - name: Enable Linux ARM64 emulation
        if: runner.os == 'Linux' && matrix.platform.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: false
          manylinux: ${{ matrix.platform.manylinux }}
      - name: Smoke-test Linux wheel with dependencies
        if: runner.os == 'Linux'
        run: >-
          docker run --rm --platform ${{ matrix.platform.docker_platform }}
          -v "${{ github.workspace }}/dist:/dist:ro"
          ${{ matrix.platform.test_image }}
          sh -c '${{ matrix.platform.python_command }} -m pip install --only-binary=:all: /dist/*.whl && ${{ matrix.platform.python_command }} -m pip check && ${{ matrix.platform.python_command }} -c "import codex_pal" && ${{ matrix.platform.binary_command }} --version'
      - name: Set up Python on macOS
        if: runner.os == 'macOS'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Set up Python on Windows
        if: runner.os == 'Windows'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          architecture: ${{ matrix.platform.python_arch }}
      - name: Smoke-test macOS wheel with dependencies
        if: runner.os == 'macOS'
        run: >-
          python -m pip install --only-binary=:all: dist/*.whl &&
          python -m pip check &&
          python -c "import codex_pal" &&
          codex-pal --version
      - name: Smoke-test Windows wheel with dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem dist/*.whl).FullName
          python -m pip install --only-binary=:all: $wheel
          python -m pip check
          python -c "import codex_pal"
          codex-pal --version
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.platform.artifact }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build-wheels, sdist]
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - name: Validate release inputs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          test -n "$CARGO_REGISTRY_TOKEN" || {
            echo "CARGO_REGISTRY_TOKEN is required in the release environment" >&2
            exit 1
          }
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo version $cargo_version" >&2
            exit 1
          fi
      - name: Verify crates.io package
        run: cargo publish --locked --dry-run
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          crate_name="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["name"])')"
          crate_version="${GITHUB_REF_NAME#v}"
          if curl --fail --silent --show-error -A 'codex-pal-release-workflow' "https://crates.io/api/v1/crates/${crate_name}/${crate_version}" >/dev/null; then
            echo "${crate_name} ${crate_version} already exists on crates.io; skipping"
          else
            cargo publish --locked
          fi
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        run: |
          package_version="${GITHUB_REF_NAME#v}"
          if curl --fail --silent --show-error "https://pypi.org/pypi/codex-pal/${package_version}/json" >/dev/null; then
            echo "codex-pal ${package_version} already exists on PyPI; skipping"
          else
            uv publish --trusted-publishing always 'wheels-*/*'
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" wheels-*/* --generate-notes
