name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_NET_RETRY: 10
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Run tests
        run: cargo test --locked

  windows-regressions:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
      - name: Resolve the Codex cmd launcher
        run: cargo test --locked codex::tests::resolves_cmd_executable_from_extensionless_name -- --exact
      - name: Locate relay in the pipx environment
        run: cargo test --locked relay::tests::locates_dependency_binary_in_copied_pipx_environment -- --exact

  build-wheels:
    needs: [rust-checks, windows-regressions]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: "2_17"
            artifact: linux-x86_64
            docker_platform: linux/amd64
            test_image: quay.io/pypa/manylinux2014_x86_64
            python_command: /opt/python/cp311-cp311/bin/python
            binary_command: /opt/python/cp311-cp311/bin/codex-pal
          - runner: ubuntu-22.04
            target: aarch64
            manylinux: "2_17"
            artifact: linux-aarch64
            docker_platform: linux/arm64
            test_image: quay.io/pypa/manylinux2014_aarch64
            python_command: /opt/python/cp311-cp311/bin/python
            binary_command: /opt/python/cp311-cp311/bin/codex-pal
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: musllinux_1_2
            artifact: musllinux-x86_64
            docker_platform: linux/amd64
            test_image: python:3.11-alpine
            python_command: python
            binary_command: codex-pal
          - runner: ubuntu-22.04
            target: aarch64
            manylinux: musllinux_1_2
            artifact: musllinux-aarch64
            docker_platform: linux/arm64
            test_image: python:3.11-alpine
            python_command: python
            binary_command: codex-pal
          - runner: macos-15-intel
            target: x86_64
            manylinux: "off"
            artifact: macos-x86_64
          - runner: macos-latest
            target: aarch64
            manylinux: "off"
            artifact: macos-aarch64
          - runner: windows-latest
            target: x64
            manylinux: "off"
            artifact: windows-x86_64
            python_arch: x64
          - runner: windows-11-arm
            target: aarch64
            manylinux: "off"
            artifact: windows-aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - name: Enable Linux ARM64 emulation
        if: runner.os == 'Linux' && matrix.platform.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: ${{ matrix.platform.manylinux }}
      - name: Smoke-test Linux wheel
        if: runner.os == 'Linux'
        run: >-
          docker run --rm --platform ${{ matrix.platform.docker_platform }}
          -v "${{ github.workspace }}/dist:/dist:ro"
          ${{ matrix.platform.test_image }}
          sh -c '${{ matrix.platform.python_command }} -m pip install --no-deps /dist/*.whl && ${{ matrix.platform.binary_command }} --version'
      - name: Set up Python on macOS
        if: runner.os == 'macOS'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Set up Python on Windows
        if: runner.os == 'Windows'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          architecture: ${{ matrix.platform.python_arch }}
      - name: Smoke-test macOS wheel
        if: runner.os == 'macOS'
        run: python -m pip install --no-deps dist/*.whl && codex-pal --version
      - name: Smoke-test Windows wheel
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem dist/*.whl).FullName
          python -m pip install --no-deps $wheel
          codex-pal --version
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.platform.artifact }}
          path: dist

  windows-python-smoke:
    needs: build-wheels
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: wheels-windows-x86_64
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install and run the same wheel
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem dist/*.whl).FullName
          python -m pip install --no-deps $wheel
          codex-pal --version

  sdist:
    needs: rust-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist
